name: Build Android APK

# Builds a release APK in the cloud (no local Android SDK needed).
# - On push to main / manual run: APK is uploaded as a workflow artifact.
# - On a version tag (vX.Y.Z): APK is also attached to a GitHub Release so
#   anyone can download and sideload it.

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.1'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code (drift + l10n)
        run: |
          dart run build_runner build --delete-conflicting-outputs
          flutter gen-l10n

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: medenglish-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Attach APK to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/app-release.apk

name: med_english
description: Medical English vocabulary and anatomy learning app for language learners and medical students.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Database ORM
  drift: ^2.22.1
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.5
  path: ^1.9.0

  # Localization
  intl: ^0.20.2

  # TTS for pronunciation
  flutter_tts: ^4.2.1

  # Google Fonts
  google_fonts: ^6.2.1

  # First-launch flag
  shared_preferences: ^2.3.3

  collection: ^1.19.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  drift_dev: ^2.22.1
  build_runner: ^2.4.13
  riverpod_generator: ^2.6.1

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/data/
